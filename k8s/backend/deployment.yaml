apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostsubs-backend
  namespace: ghostsubs
  labels:
    app: backend
spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
        role: backend

    spec:
      containers:
        - name: ghostsubs-backend-container
          image: stefanvelkov/ghost-app-api:github-latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: backend-secret
            - configMapRef:
                name: database-config
            - secretRef:
                name: database-secret
          env:
            - name: PGPOOL_HOST
              value: pgpool-service.ghostsubs.svc.cluster.local
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 8000
