apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostsubs-frontend
  namespace: ghostsubs
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: frontend
        role: frontend
    spec:
      containers:
        - name: ghostsubs-frontend-container
          image: stefanvelkov/ghost-app-frontend:github-latest
          env:
            - name: API_HOST
              value: "backend-service"
            - name: API_PORT
              value: "8000"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
