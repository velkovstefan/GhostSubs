apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ghostsubs-ingress
  namespace: ghostsubs
  labels:
    app.kubernetes.io/name: ghostsubs-ingress

spec:
  rules:
    - host: ghostsubs.local
      http:
        paths:
          - path: "/api"
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
