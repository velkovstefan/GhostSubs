apiVersion: v1
kind: ConfigMap
metadata:
  name: pgpool-failover-scripts
  namespace: ghostsubs
data:
  failover.sh: |
    #!/bin/bash
    # Arguments passed by pgpool:
    # $1 = failed node id
    # $2 = failed node hostname
    # $3 = failed node port
    # $4 = new primary node id
    # $5 = new primary hostname
    # $6 = new primary port
    echo "$(date): Failover triggered - failed node: $2, new primary: $5"
    exit 0

  post_failover.sh: |
    #!/bin/bash
    echo "$(date): Post-failover - restarting pgpool to re-detect primary..."

    # Рестартирај го pgpool deployment преку Kubernetes API
    curl -s -X PATCH \
      --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      -H "Content-Type: application/strategic-merge-patch+json" \
      "https://kubernetes.default.svc/apis/apps/v1/namespaces/ghostsubs/deployments/pgpool" \
      -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}}}}"

    echo "$(date): Restart patch sent."
    exit 0
