name: Ghost_App_Workflow
on:
  push:
    branches: [main]

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_CSS: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_JSCPD: false
  frontend_test:
    runs-on: ubuntu-latest
    needs: run-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm test -- --run

  frontend-build:
    runs-on: ubuntu-latest
    needs: [run-lint, frontend_test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: stefanvelkov/ghost-app-frontend:github-latest

  test_api:
    runs-on: ubuntu-latest
    needs: run-lint
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghostsubdb_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5

    env:
      GEMINI_API_KEY: ""
      POSTGRES_HOST: localhost
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_PORT: 5432
      POSTGRES_DB: ghostsubdb_test
      SECRET_KEY: X9kR#mP2$vL8nQ4wJ6hT0yA5cF3eDgZs
    steps:
      - name: Checkout test
        uses: actions/checkout@v4
      - name: Setup Python For Test
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - run: PYTHONPATH=. pytest tests/ -v

  api-build:
    runs-on: ubuntu-latest
    needs: [run-lint, test_api]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: stefanvelkov/ghost-app-api:github-latest

  deploy:
    runs-on: ubuntu-latest
    needs: [api-build, frontend-build]
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/ghostsubs
            git pull

            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/database/ --server-side
            kubectl apply -f k8s/backend/
            kubectl apply -f k8s/frontend/
            kubectl apply -f k8s/pgpool/

            kubectl rollout restart deployment/ghostsubs-backend -n ghostsubs
            kubectl rollout restart deployment/ghostsubs-frontend -n ghostsubs

            kubectl rollout status deployment/ghostsubs-backend -n ghostsubs --timeout=120s
            kubectl rollout status deployment/ghostsubs-frontend -n ghostsubs --timeout=120s
            kubectl rollout status deployment/pgpool -n ghostsubs --timeout=60s
