services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - frontend-network
      - backend-network
  api:
    image: stefanvelkov/ghost-app-api:github-latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
      
    
  frontend:
    image: stefanvelkov/ghost-app-frontend:github-latest
    env_file:
      - .env
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge
volumes:
  pg_data:
